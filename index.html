<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النظام الترددي — QR صوتي بهوية لكل مستخدم</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #0d1117;
  color: #e6edf3;
}
.container {
  max-width: 900px;
  margin: 40px auto;
  background: #161b22;
  padding: 25px;
  border-radius: 12px;
}
textarea, input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}
button { background: #238636; color: white; border: none; cursor: pointer; }
button:hover { background: #2ea043; }
.output {
  margin-top: 10px;
  padding: 10px;
  border: 1px dashed #30363d;
}
.small {
  font-size: 12px;
  color: #8b949e;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

</head>

<body>
<div class="container">

<h2>النظام الترددي + صوت بهوية لكل مستخدم<br>م: رأفت عمر</h2>

<label>مفتاح المستخدم:</label>
<input id="userKey" type="number" value="123456789">

<textarea id="sentenceInput" placeholder="اكتب أو استخدم الصوت"></textarea>

<button onclick="recordAudio()">🎤 تسجيل صوت للحصول على بصمة</button>
<div class="small">يتم تسجيل ~2 ثانية لاستخراج بصمة صوتية رقمية خاصة بالمستخدم.</div>

<button onclick="startSpeechToText()">🎤 تحويل الصوت إلى نص</button>

<button onclick="encodeToQR()">📦 تحويل إلى QR (نص + بصمة)</button>

<div id="qrcode"></div>

<button onclick="saveQR()">💾 حفظ الباركود</button>
<button onclick="shareQR()">📤 مشاركة الباركود</button>

<hr>

<h3>فك الباركود</h3>

<textarea id="qrInput" placeholder="الصق النص أو استخدم صورة"></textarea>

<input type="file" id="qrFileInput" accept="image/*">

<button onclick="decodeFromQR()">🔓 فك من نص</button>
<button onclick="decodeFromQRImage()">🖼️ فك من صورة</button>

<div class="output" id="decodeOutput">—</div>

<button onclick="speakText()">🔊 تشغيل الصوت بهوية المستخدم</button>
<div class="small">الصوت الناتج يعتمد على البصمة الصوتية المخزنة داخل الباركود، فيختلف بوضوح بين المستخدمين.</div>

</div>

<div id="reader-temp" style="display:none;"></div>

<script>

/* ===== النظام الترددي ===== */
const B = 32;
const LMAX = 12;
const f0 = 100000n;

const indexToChar = {
  0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
  8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
  15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
  22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي",29:"ء"
};

const charToIndex = {};
for (const [i,ch] of Object.entries(indexToChar)) {
  if (ch) charToIndex[ch] = parseInt(i);
}

function normalizeArabic(s){
  return (s||"")
  .replace(/[إأآ]/g,"ا")
  .replace(/ى/g,"ي")
  .replace(/ؤ/g,"و")
  .replace(/ئ/g,"ي")
  .replace(/ة/g,"ه")
  .replace(/[^ءاأإآبتثجحخدذرزسشصضطظعغفقكلمنهوي\s]/g,"");
}

function wordToCode(word){
  let C = 0n;
  for(let i=0;i<word.length;i++){
    const idx = charToIndex[word[i]] || 0;
    C += BigInt(idx) * (32n ** BigInt(i));
  }
  return C;
}

function codeToWord(C){
  let word = "";
  for(let i=0;i<LMAX;i++){
    const idx = Number(C % 32n);
    C /= 32n;
    word += indexToChar[idx] || "";
  }
  return word;
}

/* ===== base36 → BigInt (دقيقة) ===== */
function base36ToBigInt(str){
  let res = 0n;
  for (let i = 0; i < str.length; i++){
    const v = BigInt(parseInt(str[i], 36));
    res = res * 36n + v;
  }
  return res;
}

/* ===== بصمة صوتية تجريبية ===== */
let currentVoicePrint = "0";
let lastRecordedBlob = null;
let lastDecodedVoicePrint = "0";

async function extractVoicePrintFromBlob(blob){
  const buf = await blob.arrayBuffer();
  const u8 = new Uint8Array(buf);

  let hash = 0;
  for (let i = 0; i < 4000 && i < u8.length; i++) {
    hash = (hash * 131 + u8[i]) >>> 0; // 32-bit
  }

  return hash.toString();
}

/* ===== تسجيل صوت للحصول على بصمة ===== */
async function recordAudio(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async ()=>{
      lastRecordedBlob = new Blob(chunks, {type:"audio/webm"});
      currentVoicePrint = await extractVoicePrintFromBlob(lastRecordedBlob);
      alert("✔ تم استخراج بصمة صوتية رقمية للمستخدم.\nالبصمة ستُدمج مع الباركود.");
      stream.getTracks().forEach(t=>t.stop());
    };

    recorder.start();
    setTimeout(()=>recorder.stop(), 2200);
  } catch(e){
    alert("فشل الوصول للميكروفون.");
  }
}

/* ===== صوت → نص ===== */
function startSpeechToText(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    alert("المتصفح لا يدعم التعرف على الصوت");
    return;
  }

  const rec = new SR();
  rec.lang = "ar-SA";
  rec.start();

  rec.onresult = async e=>{
    const text = e.results[0][0].transcript;
    document.getElementById("sentenceInput").value = text;

    if (lastRecordedBlob){
      currentVoicePrint = await extractVoicePrintFromBlob(lastRecordedBlob);
    }
  };
}

/* ===== QR: ترميز نص + بصمة ===== */
function encodeToQR(){
  const key = BigInt(document.getElementById("userKey").value || "0");
  const sentence = normalizeArabic(document.getElementById("sentenceInput").value.trim());
  if (!sentence) {
    alert("أدخل نصًا أولاً.");
    return;
  }

  const words = sentence.split(/\s+/);
  const result = [];

  words.forEach(w=>{
    const C = wordToCode(w) ^ key;
    const f = f0 + C;
    result.push(f.toString(36));
  });

  const payload = {
    text: result.join(","),
    voiceprint: currentVoicePrint || "0"
  };

  const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(payload));

  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"), {
    text: compressed,
    width: 250,
    height: 250
  });
}

/* ===== فك من نص ===== */
function decodeFromQR(){
  const key = BigInt(document.getElementById("userKey").value || "0");
  const data = document.getElementById("qrInput").value.trim();
  if (!data) return;

  const json = LZString.decompressFromEncodedURIComponent(data);
  if(!json) {
    alert("فشل في فك الضغط من النص.");
    return;
  }

  let payload;
  try {
    payload = JSON.parse(json);
  } catch(e){
    alert("البيانات ليست بصيغة JSON متوقعة.");
    return;
  }

  const raw = payload.text || "";
  lastDecodedVoicePrint = payload.voiceprint || "0";

  const parts = raw.split(",");
  const words = parts.map(p=>{
    if (!p) return "";
    const f = base36ToBigInt(p);
    const C = (f - f0) ^ key;
    return codeToWord(C);
  });

  document.getElementById("decodeOutput").textContent = words.join(" ");
}

/* ===== فك من صورة ===== */
async function decodeFromQRImage(){
  const file = document.getElementById("qrFileInput").files[0];
  if(!file) return;

  const html5Qr = new Html5Qrcode("reader-temp");

  try{
    const result = await html5Qr.scanFile(file, true);
    document.getElementById("qrInput").value = result;
    decodeFromQR();
  }catch(e){
    alert("فشل قراءة صورة الـ QR.");
  }

  html5Qr.clear();
}

/* ===== صوت بهوية المستخدم ===== */
function speakText(){
  const text = document.getElementById("decodeOutput").textContent.trim();
  if (!text) {
    alert("لا يوجد نص مستخرج من الباركود.");
    return;
  }

  const vp = parseInt(lastDecodedVoicePrint || "1", 10);
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ar-SA";

  const voices = speechSynthesis.getVoices();
  if (voices.length > 0) {
    // اختيار صوت مختلف حسب البصمة
    const voiceIndex = Math.abs(vp) % voices.length;
    utter.voice = voices[voiceIndex];
  }

  // طبقة الصوت (pitch) وسرعته (rate) تعتمد على البصمة
  const basePitch = 0.7 + ((vp % 40) / 100); // 0.7 – 1.1
  const baseRate  = 0.8 + ((vp % 50) / 100); // 0.8 – 1.3

  utter.pitch = basePitch;
  utter.rate  = baseRate;

  speechSynthesis.speak(utter);
}

/* ===== حفظ + مشاركة ===== */
function getQRDataURL(){
  const img = document.querySelector("#qrcode img");
  const canvas = document.querySelector("#qrcode canvas");
  if (img && img.src) return img.src;
  if (canvas) return canvas.toDataURL("image/png");
}

function saveQR(){
  const url = getQRDataURL();
  if (!url) return;
  const a = document.createElement("a");
  a.href = url;
  a.download = "qr-code.png";
  a.click();
}

async function shareQR(){
  const url = getQRDataURL();
  if (!url) return;
  const res = await fetch(url);
  const blob = await res.blob();
  const file = new File([blob], "qr.png", {type:"image/png"});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], title:"QR"});
  } else {
    alert("المشاركة غير مدعومة على هذا الجهاز.");
  }
}

</script>
</body>
</html>
